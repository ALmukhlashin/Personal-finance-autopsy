services:
  postgres:
    image: postgres:16-alpine
    container_name: pfa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pfa
      POSTGRES_PASSWORD: pfa_secret
      POSTGRES_DB: personal_finance_autopsy
    ports:
      - "5432:5432"
    volumes:
      - pfa_pg_data:/var/lib/postgresql/data

volumes:
  pfa_pg_data:
